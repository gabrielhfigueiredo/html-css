<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 {
            display: inline;
            font-size: 2em;
            border: 5px solid lightgrey;
            margin: auto;
        }

        p {
            text-align: center;
            width: 300px;
            border-width: 5px;
            border-style: double;
            border-color: lightskyblue;
            padding: 5px;
            margin: 35px auto 45px auto;
            outline: 5px;
            outline-style: dashed;
            outline-color: red;
            
        }

    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level. Já os <a href="#">links são inline-levels</a>. Vamos ver como funcionar tudo isso</p>

</body>
</html>
