<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens, vídeos e audios:</title>
</head>
<body>

    <h1>Imagens, vídeos e audios:</h1>
    <hr>
    <h2>Imagens</h2>
    <p>Vamos adicionar algumas <strong>imagens flexiveis</strong> agora<strong>:</strong></p>
    
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>
    <hr>
    <h2>Reproduzindo um aúdio</h2>
    <audio src="midias/Comin Wit It - Anno Domini Beats.mp3" controls ="none" preload="metadata"></
    <p>Seu navegador não é compatível com esse áudio<a href="midias/Comin Wit It - Anno Domini Beats.mp3" hreflang="pt-br" target="_blank">Link para baixar o áudio</a></p>
    <hr>
    
</body>
</html>
